<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Asset - Airtel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Register New Asset - Rusizi Hub</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/assets/save}" th:object="${asset}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Tag ID</label>
                            <input type="text" th:field="*{tagId}" class="form-control" placeholder="e.g. ART-001" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Serial Number</label>
                            <input type="text" th:field="*{serialNumber}" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Device Type</label>
                            <select th:field="*{deviceType}" class="form-control">
                                <option value="Laptop">Laptop</option>
                                <option value="Desktop">Desktop</option>
                                <option value="Printer">Printer</option>
                                <option value="Router">Router</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Model</label>
                            <input type="text" th:field="*{model}" class="form-control">
                        </div>
                    </div>
                    <hr>
                    <button type="submit" class="btn btn-danger w-100">SAVE ASSET</button>
                    <a href="/dashboard" class="btn btn-secondary w-100 mt-2">CANCEL</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
