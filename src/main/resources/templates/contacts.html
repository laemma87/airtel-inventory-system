<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Contacts - Airtel Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .header-red { background: #e60000; color: white; padding: 15px; }
        .btn-airtel { background: #e60000; color: white; }
        .btn-airtel:hover { background: #c40000; color: white; }
        .sidebar { background: #282828; min-height: 100vh; color: white; }
        .nav-link { color: white; padding: 15px; }
        .nav-link:hover { background: #e60000; }
    </style>
</head>
<body class="bg-light">
    <div class="header-red">
        <h4 class="m-0">AIRTEL ASSET MANAGEMENT - STAFF DIRECTORY</h4>
    </div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                    <a class="nav-link" href="/assets/new">Register Asset</a>
                    <a class="nav-link active bg-danger" href="/contacts">Staff Contacts</a>
                    <a class="nav-link text-danger" href="/logout">Logout</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-dark text-white">Add New Staff</div>
                            <div class="card-body">
                                <form th:action="@{/contacts/save}" th:object="${contact}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label small">Employee ID</label>
                                        <input type="text" th:field="*{employeeId}" class="form-control" placeholder="e.g. EMP100" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small">Full Name</label>
                                        <input type="text" th:field="*{name}" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small">Department</label>
                                        <select th:field="*{department}" class="form-select">
                                            <option value="IT Support">IT Support</option>
                                            <option value="Sales">Sales</option>
                                            <option value="Finance">Finance</option>
                                            <option value="Logistics">Logistics</option>
                                            <option value="HR">HR</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small">Phone Number</label>
                                        <input type="text" th:field="*{phone}" class="form-control" placeholder="078xxxxxxx">
                                    </div>
                                    <button type="submit" class="btn btn-airtel w-100">Register Staff</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-0">
                                <table class="table table-hover m-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>EMP ID</th>
                                            <th>Name</th>
                                            <th>Department</th>
                                            <th>Phone</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${contacts}">
                                            <td th:text="${c.employeeId}"></td>
                                            <td th:text="${c.name}" class="fw-bold"></td>
                                            <td th:text="${c.department}"></td>
                                            <td th:text="${c.phone}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                                <div th:if="${#lists.isEmpty(contacts)}" class="text-center p-5">
                                    <p class="text-muted">No staff members registered yet.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="mt-4 text-muted small">© 2026 LAEMMA INFO TECH | Rusizi Hub Management</p>
            </div>
        </div>
    </div>
</body>
</html>
