<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Airtel Inventory </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .sidebar { background: #282828; min-height: 100vh; color: white; }
        .nav-link { color: white; padding: 15px; border-radius: 0; }
        .nav-link:hover { background: #e60000; }
        .header-red { background: #e60000; color: white; padding: 15px; }
        .stat-card { border-left: 5px solid #e60000; background: white; padding: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid p-0">
        <div class="header-red">
            <h4 class="m-0">AIRTEL ASSET MANAGEMENT</h4>
        </div>

        <div class="row g-0">
            <div class="col-md-2 sidebar">
                <nav class="nav flex-column text-center">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                    <a class="nav-link" href="/assets/new">Register Asset</a>
                    <a class="nav-link" href="/contacts">Staff Contacts</a>
                    <a class="nav-link text-warning" href="#">Reports</a>
                    <a class="nav-link text-danger" href="/logout">Logout</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="row mb-4 text-center">
                    <div class="col-md-4">
                        <div class="stat-card shadow-sm">
                            <p class="text-muted mb-0">Total Assets</p>
                            <h2 th:text="${assetCount}">0</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card shadow-sm" style="border-color: #323232;">
                            <p class="text-muted mb-0">Staff Registered</p>
                            <h2 th:text="${staffCount}">0</h2>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Tag ID</th>
                                    <th>Serial</th>
                                    <th>Model</th>
                                    <th>Status</th>
                                    <th>User</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="asset : ${assets}">
                                    <td th:text="${asset.tagId}"></td>
                                    <td th:text="${asset.serialNumber}"></td>
                                    <td th:text="${asset.model}"></td>
                                    <td th:text="${asset.status}"></td>
                                    <td th:text="${asset.assignedTo}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <p class="mt-4 text-muted small">© Airtel 2026 All Rights Reserved </p>
            </div>
        </div>
    </div>
</body>
</html>
