<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Asset - Airtel Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .header-red { background: #e60000; color: white; padding: 15px; }
        .btn-airtel { background: #e60000; color: white; border: none; }
        .btn-airtel:hover { background: #c40000; color: white; }
        .form-label { font-weight: bold; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">
    <div class="header-red mb-4 shadow-sm">
        <div class="container">
            <h4 class="m-0">AIRTEL ASSET REGISTRATION</h4>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="@{/assets/save}" th:object="${asset}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Asset Tag ID</label>
                                    <input type="text" th:field="*{tagId}" class="form-control" placeholder="e.g. ART-KGL-001" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Serial Number</label>
                                    <input type="text" th:field="*{serialNumber}" class="form-control" placeholder="S/N 123456789" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Device Type</label>
                                    <select th:field="*{deviceType}" class="form-select">
                                        <option value="Laptop">Laptop</option>
                                        <option value="Desktop">Desktop</option>
                                        <option value="Router">Router</option>
                                        <option value="Printer">Printer</option>
                                        <option value="Smartphone">Smartphone</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Model / Specs</label>
                                    <input type="text" th:field="*{model}" class="form-control" placeholder="e.g. HP EliteBook 840 G5">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Device Condition</label>
                                <select th:field="*{deviceCondition}" class="form-select">
                                    <option value="New">New</option>
                                    <option value="Good">Good</option>
                                    <option value="Fair">Fair</option>
                                    <option value="Damaged">Damaged</option>
                                </select>
                            </div>

                            <div class="d-flex justify-content-between border-top pt-3">
                                <a href="/dashboard" class="btn btn-outline-secondary px-4">Cancel</a>
                                <button type="submit" class="btn btn-airtel px-5">SAVE ASSET</button>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted mt-4 small">© 2026 LAEMMA INFO TECH | Airtel Inventory System</p>
            </div>
        </div>
    </div>
</body>
</html>
