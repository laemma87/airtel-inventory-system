<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Asset - Airtel Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-header { background: #e60000; color: white; }
        .btn-airtel { background: #e60000; color: white; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header">
                        <h5 class="mb-0">Assign Asset to Staff</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/assets/confirm-issue}" method="post">
                            <input type="hidden" name="id" th:value="${asset.id}">
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Device</label>
                                <input type="text" class="form-control" th:value="${asset.model + ' (' + asset.tagId + ')'}" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Assign to Staff Member</label>
                                <select name="assignedTo" class="form-select" required>
                                    <option value="">-- Select Staff --</option>
                                    <option th:each="staff : ${staffList}" 
                                            th:value="${staff.name}" 
                                            th:text="${staff.name + ' (' + staff.department + ')'}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Current Condition</label>
                                <select name="condition" class="form-select">
                                    <option value="Good">Good</option>
                                    <option value="New">New</option>
                                    <option value="Damaged">Damaged</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-airtel">CONFIRM ISSUE</button>
                                <a href="/dashboard" class="btn btn-light">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
