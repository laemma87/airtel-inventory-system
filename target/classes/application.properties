# Railway MySQL Configuration
# These variables (${MYSQLHOST}, etc.) are automatically filled by Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JdbcTemplate & Connection Pool Settings
# Since we removed JPA, we don't need ddl-auto. 
# This ensures the connection stays alive during heavy use.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# Server Configuration
# Railway provides the PORT variable; we default to 8080 for local testing
server.port=${PORT:8080}

# Logging (Helpful for troubleshooting the Rusizi Hub deployment)
logging.level.org.springframework.jdbc.core=DEBUG